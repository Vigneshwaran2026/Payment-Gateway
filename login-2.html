<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stackly Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#020617;
color:white;
}

/* BACK BUTTON */

.back-home{
position:absolute;
top:25px;
left:25px;
}

.back-home a{
text-decoration:none;
color:white;
background:linear-gradient(135deg,#00ff9d,#1b7fff);
padding:8px 16px;
border-radius:8px;
font-size:14px;
display:flex;
align-items:center;
gap:6px;
}

/* CONTAINER */

.container{
width:380px;
background:#050b1d;
padding:30px;
border-radius:16px;
border:1px solid transparent;

background-image:
linear-gradient(#050b1d,#050b1d),
linear-gradient(135deg,#00ff9d,#1b7fff);

background-origin:border-box;
background-clip:padding-box, border-box;

transition:all .3s ease;
}

/* LOGO */

.logo{
text-align:center;
margin-bottom:15px;
}

.logo img{
width:140px;
}

/* TABS */

.tabs{
display:flex;
margin-bottom:20px;
border-radius:8px;
overflow:hidden;
}

.tabs button{
flex:1;
padding:10px;
border:none;
background:#0b1120;
color:#ccc;
cursor:pointer;
font-size:14px;
}

.tabs button.active{
background:linear-gradient(135deg,#00ff9d,#1b7fff);
color:#000;
font-weight:600;
}

/* FORM */

.form{
display:none;
}

.form.active{
display:block;
}

/* INPUT GROUP */

.input-group{
margin-bottom:12px;
}

.input-group label{
font-size:13px;
color:#ccc;
}

.input-group input{
width:100%;
padding:9px 12px;
margin-top:4px;
border-radius:8px;
border:1px solid rgba(255,255,255,0.15);
background:#0b1120;
color:white;
font-size:14px;
}

.input-group input:focus{
outline:none;
border:1px solid #00ff9d;
}

/* ERROR MESSAGE */

.error-msg{
color:#ff4d4d;
font-size:12px;
margin-top:4px;
}

/* BUTTON */

.btn{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#00ff9d,#1b7fff);
font-weight:600;
cursor:pointer;
margin-top:8px;
font-size:14px;
}

/* FORGOT PASSWORD */

.forgot{
text-align:right;
margin-top:-6px;
margin-bottom:12px;
}

.forgot a{
color:#00ff9d;
font-size:13px;
text-decoration:none;
cursor:pointer;
}

/* BACK LOGIN */

.back-login{
margin-top:12px;
text-align:center;
}

.back-login a{
color:#00ff9d;
font-size:13px;
cursor:pointer;
text-decoration:none;
}

/* MOBILE */

@media(max-width:500px){

.container{
width:90%;
padding:25px;
}

.logo img{
width:120px;
}

}
</style>
</head>
<body>

<div class="back-home">
<a href="index-2.html"><i class="fa fa-arrow-left"></i> Home</a>
</div>

<div class="container">

<div class="logo">
<img src="assets/img/logo/logo.webp">
</div>

<div class="tabs">
<button class="active" onclick="showForm('login')">Login</button>
<button onclick="showForm('register')">Register</button>
</div>


<!-- LOGIN FORM -->

<form id="login" class="form active">

<div class="input-group">
<label>Email</label>
<input type="email" id="loginEmail">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="loginPassword">
</div>

<div class="forgot">
<a onclick="showForm('forgot')">Forgot password?</a>
</div>

<button class="btn">Login</button>

</form>


<!-- REGISTER FORM -->

<form id="register" class="form">

<div class="input-group">
<label>Full Name</label>
<input type="text" id="regName">
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="regEmail">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="regPassword">
</div>

<div class="input-group">
<label>Confirm Password</label>
<input type="password" id="regConfirm">
</div>

<button class="btn">Create Account</button>

<div class="back-login">
<a onclick="showForm('login')">Already have an account? Login</a>
</div>

</form>


<!-- FORGOT PASSWORD -->

<form id="forgot" class="form">

<div class="input-group">
<label>Enter your registered email</label>
<input type="email" id="forgotEmail">
</div>

<button class="btn">Reset Password</button>

<div class="back-login">
<a onclick="showForm('login')">Back to Login</a>
</div>

</form>

</div>

<script>

/* FORM SWITCH */

function showForm(form){

document.querySelectorAll(".form").forEach(f=>{
f.classList.remove("active")
})

document.querySelectorAll(".tabs button").forEach(b=>{
b.classList.remove("active")
})

document.getElementById(form).classList.add("active")

if(form==="login"){
document.querySelectorAll(".tabs button")[0].classList.add("active")
}

if(form==="register"){
document.querySelectorAll(".tabs button")[1].classList.add("active")
}

}


/* ERROR MESSAGE */

function showError(input,msg){

let parent=input.parentElement

let error=document.createElement("div")
error.className="error-msg"
error.innerText=msg
error.style.color="#ff4d4d"
error.style.fontSize="12px"
error.style.marginTop="5px"

parent.appendChild(error)

setTimeout(()=>{
error.remove()
},3000)

}


/* EMAIL VALIDATION */

function validEmail(email){

let pattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/
return pattern.test(email)

}


/* STRONG PASSWORD */

function strongPassword(pass){

let pattern=/^(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/
return pattern.test(pass)

}


/* -----------------------
LOGIN FORM
----------------------- */

document.getElementById("login").addEventListener("submit",function(e){

e.preventDefault()

let email=document.getElementById("loginEmail")
let password=document.getElementById("loginPassword")

if(email.value==""){
showError(email,"Please enter email")
return
}

if(!validEmail(email.value)){
showError(email,"Invalid email format")
return
}

if(!strongPassword(password.value)){
showError(password,"Password must contain uppercase, lowercase, number & symbol")
return
}

/* SUCCESS REDIRECT */
window.location.href="404-2.html"

})


/* -----------------------
REGISTER FORM
----------------------- */

document.getElementById("register").addEventListener("submit",function(e){

e.preventDefault()

let name=document.getElementById("regName")
let email=document.getElementById("regEmail")
let password=document.getElementById("regPassword")
let confirm=document.getElementById("regConfirm")

if(name.value==""){
showError(name,"Please enter name")
return
}

if(!validEmail(email.value)){
showError(email,"Invalid email")
return
}

if(!strongPassword(password.value)){
showError(password,"Password must contain uppercase, lowercase, number & symbol")
return
}

if(confirm.value==""){
showError(confirm,"Confirm password")
return
}

if(password.value!==confirm.value){
showError(confirm,"Passwords do not match")
return
}

/* SUCCESS REDIRECT */
window.location.href="404-2.html"

})


/* -----------------------
FORGOT PASSWORD
----------------------- */

document.getElementById("forgot").addEventListener("submit",function(e){

e.preventDefault()

let email=document.getElementById("forgotEmail")

if(email.value==""){
showError(email,"Please enter email")
return
}

if(!validEmail(email.value)){
showError(email,"Invalid email")
return
}

/* SUCCESS REDIRECT */
window.location.href="404-2.html"

})

</script>
</body>
</html>
